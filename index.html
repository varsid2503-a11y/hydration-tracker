<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydratePro | The Smartest Water Tracker for Free</title>
    <meta name="title" content="HydratePro | The Smartest Water Tracker for Free">
    <meta name="description" content="A professional hydration dashboard built by Varsid. Features include dynamic goal calculation based on weight, weekly analytics charts, and focus mode.">
    <meta name="keywords" content="Varsid, HydratePro, water tracker, PWA, 6th grade STEM project, JavaScript dashboard, hydration analytics">
    <meta name="author" content="Varsid2503-a11y">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <h1>HydratePro Dashboard</h1>

        <div class="settings-panel">
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="user-weight" value="35" onchange="updateGoal()">
            </div>
            <div class="input-group">
                <label>Remind (min)</label>
                <input type="number" id="reminder-interval" value="15" onchange="updateReminders()">
            </div>
        </div>

        <div class="progress-circle">
            <span id="percentage-text">0%</span>
        </div>

        <div id="total-display">0ml</div>
        <div class="goal-text">Goal: 1225ml</div>

        <div class="button-group">
            <button onclick="addWater(250)">+ 250ml</button>
            <button onclick="addWater(500)">+ 500ml</button>
        </div>

        <div class="chart-container">
            <canvas id="weeklyChart"></canvas>
        </div>

        <div class="focus-mode-container">
            <label class="switch">
                <input type="checkbox" id="focus-toggle" onchange="toggleFocusMode()">
                <span class="slider"></span>
            </label>
            <span>Focus Mode (45m)</span>
        </div>

        <div class="history-container">
            <h3>Recent Activity</h3>
            <ul id="history-list"></ul>
        </div>

        <button onclick="resetApp()" class="reset-btn">Reset Day</button>
    </div>

    <div id="victory-modal" class="hidden">
        <div class="modal-content">
            <div style="font-size: 3rem;">🏆</div>
            <h2>GOAL REACHED!</h2>
            <p>Your brain and body thank you!</p>
            <button onclick="closeVictory()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
