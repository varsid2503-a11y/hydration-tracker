<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid Projects</title>
    <meta name="description" content="Browse Varsid projects including HydratePro and Racing Limits.">
    <style>
        :root {
            --primary: #00b4d8;
            --secondary: #ff6b35;
            --bg: #090d12;
            --panel: #151b23;
            --text: #eef4fb;
            --muted: #93a4b6;
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 28px 18px;
            color: var(--text);
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 180, 216, 0.16), transparent 26%),
                radial-gradient(circle at bottom, rgba(255, 107, 53, 0.15), transparent 28%),
                linear-gradient(180deg, #091019, var(--bg));
        }

        .container {
            width: min(100%, 620px);
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: clamp(2.2rem, 5vw, 3rem);
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .project-list {
            display: grid;
            gap: 16px;
        }

        .card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
            color: var(--text);
            text-decoration: none;
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        }

        .card:hover,
        .card:focus-visible {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
            outline: none;
        }

        .card.hydrate:hover,
        .card.hydrate:focus-visible {
            border-color: rgba(0, 180, 216, 0.5);
        }

        .card.race:hover,
        .card.race:focus-visible {
            border-color: rgba(255, 107, 53, 0.5);
        }

        .card-info h2 {
            margin: 0 0 6px;
            font-size: 1.3rem;
        }

        .card-info p {
            margin: 0;
            color: var(--muted);
        }

        .badge {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="hero">
            <h1>Varsid Projects</h1>
            <p>Open one of the live mini apps below.</p>
        </section>

        <section class="project-list" aria-label="Project list">
            <a href="./HydratePro/" class="card hydrate">
                <div class="card-info">
                    <h2>HydratePro</h2>
                    <p>Smart calculator and water tracker.</p>
                </div>
                <span class="badge">Utility</span>
            </a>

            <a href="./CarRace/" class="card race">
                <div class="card-info">
                    <h2>Racing Limits</h2>
                    <p>High score: <span id="displayBest">0</span></p>
                </div>
                <span class="badge">Game</span>
            </a>
        </section>
    </main>

    <script>
        const best = localStorage.getItem("racingHighScore") || 0;
        document.getElementById("displayBest").textContent = best;
    </script>
</body>
</html>
