<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid's Project Hub</title>
    <meta name="description" content="Varsid's personal STEM and Web Development portfolio.">
    <meta name="keywords" content="Varsid, STEM, HydratePro, Robotics, Abacus, Coding, Portfolio">

    <style>
        :root {
            --primary: #00b4d8;
            --bg: #0b0d11;
            --card: #161b22;
            --text: #f0f6fc;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 0;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; }
        .subtitle { opacity: 0.6; font-size: 0.9rem; }

        /* Project Cards */
        .project-list { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card-info h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .card-info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7; }

        /* --- New CSS for the Robotics Icon --- */
        .card-icon {
            font-size: 2.5rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            opacity: 0.6;
            margin-left: 20px;
            position: relative;
        }

        .robot-head {
            border: 3px solid var(--primary);
            border-radius: 5px;
            width: 25px;
            height: 15px;
            position: relative;
        }

        .robot-head::before { /* Antenna */
            content: "";
            position: absolute;
            bottom: 100%;
            left: 50%;
            width: 2px;
            height: 10px;
            background: var(--primary);
            transform: translateX(-50%);
        }

        .robot-head::after { /* Antenna Tip */
            content: "";
            position: absolute;
            bottom: 110%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            transform: translateX(-50%);
        }

        .robot-base {
            border: 3px solid var(--primary);
            border-radius: 10px;
            width: 35px;
            height: 15px;
            margin-top: 3px;
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="welcomeMsg">Varsid's Hub</h1>
            <p class="subtitle">STEM Projects & Web Apps</p>
        </header>

        <div class="project-list">
            <a href="./HydratePro/" class="card">
                <div class="card-info">
                    <h2>💧 HydratePro</h2>
                    <p>Smart Calculator & Water Tracker</p>
                </div>
                <div class="card-icon">💧</div>
            </a>

            <a href="#" class="card" style="opacity: 0.5; cursor: not-allowed;">
                <div class="card-info">
                    <h2>🤖 Robotics Lab</h2>
                    <p>Arduino & Tinkercad Projects (Coming Soon)</p>
                </div>
                <div class="card-icon">
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <div class="robot-head"></div>
                        <div class="robot-base"></div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <footer>Built by Varsid | 2026</footer>

    <script>
        // Simple script to greet you based on time
        const hour = new Date().getHours();
        const msg = document.getElementById('welcomeMsg');
        
        if (hour < 12) msg.innerText = "Good Morning, Varsid!";
        else if (hour < 18) msg.innerText = "Good Afternoon, Varsid!";
        else msg.innerText = "Good Evening, Varsid!";

        console.log("Main Menu Loaded Successfully");
    </script>
</body>
</html>
