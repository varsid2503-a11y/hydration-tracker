<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid's Hydration Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="flex">
  <div class="container">
    <h1>Hydration Tracker Pro</h1>
    
    <div class="progress-circle">
      <span id="percentage-text">0%</span>
    </div>

    <div id="total-display">0ml</div>
    <p>Goal: 2000ml</p>

    <div class="button-group">
      <button onclick="addWater(250)">+ 250ml</button>
      <button onclick="addWater(500)">+ 500ml</button>
    </div>

    <div class="focus-mode-container">
  <label class="switch">
    <input type="checkbox" id="focus-toggle" onchange="toggleFocusMode()">
    <span class="slider"></span>
  </label>
  <span>Focus Mode (45m)</span>
</div>

    <button id="help-btn" onclick="toggleModal('help-modal')">?</button>
  </div>

  <div id="victory-modal" class="hidden" onclick="closeVictory()">
    <div class="modal-content">
      <h2>Goal Reached! 🏆</h2>
      <p>Great job staying hydrated today!</p>
    </div>
  </div>

  <div class="history-container">
  <h3>Recent Activity</h3>
  <ul id="history-list">
    </ul>
</div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
