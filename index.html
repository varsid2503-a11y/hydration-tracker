<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Varsid's Hydration Tracker | Best Daily Water Intake App</title>
    <meta name="description" content="Track your daily water intake with Varsid's Hydration Tracker. A free, simple STEM project tool to help students and athletes stay healthy.">
    <meta name="keywords" content="hydration tracker, water intake app, Varsid, STEM project, daily water goal">
</head>
<body>
    <div class="tracker-container">
        <h2>Varsid's Hydration Tracker</h2>

        <div class="goal-section">
            <label>Set Daily Goal (ml): </label>
            <input type="number" id="goal-input" value="2000">
        </div>
        <div id="victory-msg" style="display: none;">
            <h1>🏆</h1>
            <p>Goal Reached! Stay Hydrated!</p>
        </div>
        <p id="status">Total: 0ml</p>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <input type="number" id="water-input" placeholder="Enter ml">
        <button id="add-btn">Add Water</button>
        <button id="reset-btn">Reset</button>

        <div id="badge-container">
            <h3>Your Achievements</h3>
            <div class="badge-grid">
                <div id="badge-first" class="badge locked">🌱<br>First Sip</div>
                <div id="badge-hero" class="badge locked">🏆<br>Hero</div>
                <div id="badge-streak" class="badge locked">🔥<br>3-Day</div>
            </div>
        </div>

        <div class="history-section">
            <h3>Today's History</h3>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
