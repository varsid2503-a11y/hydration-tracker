<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid's Project Hub</title>
    <style>
        :root {
            --primary: #00b4d8;
            --bg: #0b0d11;
            --card: #161b22;
            --text: #f0f6fc;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 0;
        }

        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 20px; }

        .project-list { display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-info h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .card-info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Varsid's Hub</h1>
        <div class="project-list">
            <a href="./HydratePro/" class="card">
                <div class="card-info">
                    <h2>💧 HydratePro</h2>
                    <p>Smart Calculator & Water Tracker</p>
                </div>
                <span>→</span>
            </a>
        </div>
    </div>
</body>
</html>
