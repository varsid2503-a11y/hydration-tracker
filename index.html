<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid's Engineering Hub</title>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #005f73;
            --bg: #05070a;
            --card-bg: rgba(22, 27, 34, 0.7);
            --text: #e6edf3;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #003542 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #001219 0%, transparent 50%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 60px 0;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        /* The Animated Glow Border */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 2px; 
            background: linear-gradient(45deg, transparent, rgba(0, 212, 255, 0.5), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(22, 27, 34, 0.9);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .card:hover::before { opacity: 1; }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .card-info { text-align: left; flex-grow: 1; }
        .card-info h2 { margin: 0; font-size: 1.25rem; font-weight: 600; }
        .card-info p { margin: 4px 0 0; font-size: 0.9rem; color: #8b949e; }

        .arrow {
            font-size: 1.2rem;
            opacity: 0.3;
            transition: 0.3s;
        }

        .card:hover .arrow {
            opacity: 1;
            transform: translateX(5px);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Varsid's Hub</h1>
        
        <div class="project-list">
            <a href="./HydratePro/" class="card">
                <div class="icon-circle">💧</div>
                <div class="card-info">
                    <h2>HydratePro</h2>
                    <p>Smart Hydration Assistant</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <div style="margin-top: 20px; font-size: 0.8rem; color: #484f58; letter-spacing: 1px;">
                READY FOR NEW DEPLOYMENTS
            </div>
        </div>
    </div>
</body>
</html>
