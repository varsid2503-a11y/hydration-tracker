<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsid Hub | Dashboard</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #05070a;
            --card-bg: rgba(22, 27, 34, 0.8);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Particles Canvas Area */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            z-index: 1000;
        }

        .logout-btn:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 80px 0;
            z-index: 1;
        }

        .user-greeting {
            margin-bottom: 50px;
            text-align: center;
        }

        #welcome-text {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #display-name {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 800;
        }

        #display-name span {
            background: linear-gradient(to bottom, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .card-info h2 { margin: 0; font-size: 1.2rem; }
        .card-info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.6; }

        .badge {
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            display: inline-block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <button class="logout-btn" onclick="logout()">Logout ⏻</button>

    <div class="container">
        <div class="user-greeting">
            <p id="welcome-text">SYSTEM ONLINE</p>
            <h1 id="display-name">Welcome, <span>Engineer</span></h1>
        </div>

        <div class="project-grid">
            <a href="../HydratePro/index.html" class="card">
                <div class="icon-circle">💧</div>
                <div class="card-info">
                    <span class="badge">● Active</span>
                    <h2>HydratePro</h2>
                    <p>Smart Water Tracking System</p>
                </div>
            </a>

            <a href="../RoboticsLab/index.html" class="card">
                <div class="icon-circle">🤖</div>
                <div class="card-info">
                    <span class="badge">● Active</span>
                    <h2>Robotics Lab</h2>
                    <p>Logic Gate & Laser Simulation</p>
                </div>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // Security & Personalization
        window.onload = function() {
            const user = localStorage.getItem('currentUser');
            if (!localStorage.getItem('isLoggedIn') && !user) {
                window.location.href = "../index.html";
                return;
            }
            if (user) {
                document.querySelector('#display-name span').innerText = user;
            }
        };

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = "../index.html";
        }

        // Particles Config
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00d4ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00d4ff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
