<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotics Lab | Logic Gates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lab-grid"></div>
    <div class="lab-container">
        <header>
            <h1>Logic<span>Lab</span></h1>
            <div class="status-chip" id="gate-name">AND GATE</div>
        </header>

        <div class="circuit-area">
            <div class="inputs">
                <div class="switch-node" id="sw-a" onclick="toggleSwitch('a')">OFF</div>
                <div class="switch-node" id="sw-b" onclick="toggleSwitch('b')">OFF</div>
            </div>
            
            <div class="gate-visual">
                <div class="wire-path" id="wire-a"></div>
                <div class="wire-path" id="wire-b"></div>
                <div class="gate-body">D</div>
                <div class="wire-out" id="wire-out"></div>
            </div>

            <div class="output">
                <div class="led-bulb" id="output-led"></div>
                <small>OUTPUT</small>
            </div>
        </div>

        <div class="control-panel">
            <button class="mode-btn" onclick="setGate('AND')">AND Gate</button>
            <button class="mode-btn" onclick="setGate('OR')">OR Gate</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
