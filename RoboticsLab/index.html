<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLab | Advanced</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lab-grid"></div>
    <a class="hub-link" href="../index.html">← Main Hub</a>
    <div class="lab-container">
        <header>
            <h1>Logic<span>Lab</span></h1>
            <div class="status-chip" id="gate-name">AND GATE</div>
        </header>

        <div class="counter-display">
            <small>LOGIC TRIGGERS</small>
            <h2 id="binary-count">0000</h2>
        </div>

        <div class="circuit-area">
            <div class="inputs" id="input-container">
                <div class="switch-node" id="sw-a" onclick="toggleSwitch('a')">OFF</div>
                <div class="switch-node" id="sw-b" onclick="toggleSwitch('b')">OFF</div>
            </div>
            
            <div class="gate-visual">
                <div class="gate-body" id="gate-shape">D</div>
            </div>

            <div class="output">
                <div class="led-bulb" id="output-led"></div>
                <small>OUTPUT</small>
            </div>
        </div>

        <div class="control-panel">
            <button class="mode-btn" onclick="setGate('AND')">AND</button>
            <button class="mode-btn" onclick="setGate('OR')">OR</button>
            <button class="mode-btn" onclick="setGate('NOT')">NOT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
